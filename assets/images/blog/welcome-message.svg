<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="福祉ITパートナーの情報発信のイメージイラスト">
  <defs>
    <linearGradient id="bgWelcome" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f4ee"/>
      <stop offset="100%" stop-color="#fbf6ec"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bgWelcome)"/>

  <!-- 若葉アクセント -->
  <path d="M46 64c14-22 40-28 60-18-8 24-34 38-60 18z" fill="#4a8c6f" opacity="0.85"/>
  <path d="M748 90c-12-22-38-28-58-18 6 24 32 38 58 18z" fill="#4a8c6f" opacity="0.8"/>
  <path d="M58 388c10-18 30-22 46-14-6 18-26 30-46 14z" fill="#9fcab3" opacity="0.9"/>
  <circle cx="700" cy="380" r="10" fill="#e8965a" opacity="0.9"/>
  <circle cx="120" cy="100" r="7" fill="#e8965a" opacity="0.75"/>

  <!-- 発信の波（電波・お知らせ） -->
  <g transform="translate(560 110)" fill="none" stroke="#4a8c6f" stroke-width="5" stroke-linecap="round">
    <path d="M0 40c10-20 30-20 40 0" opacity="0.9"/>
    <path d="M-14 50c16-30 48-30 64 0" opacity="0.6"/>
    <path d="M-28 60c22-40 66-40 88 0" opacity="0.35"/>
  </g>
  <circle cx="560" cy="150" r="8" fill="#e8965a"/>

  <!-- ノートパソコン -->
  <g transform="translate(300 190)">
    <rect x="0" y="70" width="220" height="16" rx="7" fill="#1f4d3c"/>
    <rect x="18" y="0" width="184" height="120" rx="10" fill="#ffffff" stroke="#1f4d3c" stroke-width="5"/>
    <rect x="32" y="14" width="156" height="92" rx="4" fill="#e8f4ee"/>
    <rect x="44" y="28" width="90" height="10" rx="3" fill="#2c6b54"/>
    <rect x="44" y="46" width="130" height="8" rx="3" fill="#9fcab3"/>
    <rect x="44" y="60" width="110" height="8" rx="3" fill="#9fcab3"/>
    <rect x="44" y="80" width="54" height="16" rx="8" fill="#e8965a"/>
  </g>

  <!-- 人物（あいさつのイメージ） -->
  <g transform="translate(140 270)">
    <circle cx="28" cy="22" r="22" fill="#f4cfa6"/>
    <path d="M0 100c2-32 13-56 28-56s26 24 28 56z" fill="#2c6b54"/>
  </g>

  <!-- ハート -->
  <g transform="translate(230 250)">
    <path d="M14 26C-4 13 0-5 14 1c14-6 18 12 0 25z" fill="#e8965a"/>
  </g>
</svg>
