<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="就労継続支援B型事業所での作業とホームページ制作のイメージイラスト">
  <defs>
    <linearGradient id="bgBtype" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f4ee"/>
      <stop offset="100%" stop-color="#fbf6ec"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bgBtype)"/>

  <!-- 若葉・アクセント -->
  <path d="M44 70c14-22 40-28 60-18-8 24-34 38-60 18z" fill="#4a8c6f" opacity="0.85"/>
  <path d="M742 100c-12-22-38-28-58-18 6 24 32 38 58 18z" fill="#4a8c6f" opacity="0.8"/>
  <circle cx="700" cy="360" r="10" fill="#e8965a" opacity="0.9"/>
  <circle cx="70" cy="380" r="7" fill="#e8965a" opacity="0.75"/>

  <!-- 作業台 -->
  <g transform="translate(70 230)">
    <rect x="0" y="60" width="230" height="14" rx="6" fill="#2c6b54"/>
    <!-- 箱・梱包作業 -->
    <rect x="10" y="10" width="50" height="50" rx="6" fill="#ffffff" stroke="#9fcab3" stroke-width="4"/>
    <path d="M10 30h50M35 10v50" stroke="#9fcab3" stroke-width="4"/>
    <rect x="75" y="-10" width="46" height="70" rx="6" fill="#e8f4ee" stroke="#4a8c6f" stroke-width="4"/>
    <!-- 手仕事（縫製・手芸イメージ） -->
    <circle cx="170" cy="20" r="22" fill="none" stroke="#e8965a" stroke-width="5"/>
    <path d="M152 20h36M170 2v36" stroke="#e8965a" stroke-width="3"/>
  </g>

  <!-- 手（作業のイメージ） -->
  <g transform="translate(150 290)">
    <path d="M0 30c4-16 14-26 28-26s24 10 28 26c2 8-2 16-10 16H10c-8 0-12-8-10-16z" fill="#f4cfa6"/>
    <rect x="22" y="2" width="12" height="26" rx="6" fill="#f4cfa6"/>
  </g>

  <!-- ノートパソコン + ホームページ画面 -->
  <g transform="translate(360 170)">
    <rect x="0" y="70" width="220" height="16" rx="7" fill="#1f4d3c"/>
    <rect x="18" y="0" width="184" height="120" rx="10" fill="#ffffff" stroke="#1f4d3c" stroke-width="5"/>
    <rect x="32" y="14" width="156" height="92" rx="4" fill="#e8f4ee"/>
    <rect x="44" y="26" width="96" height="12" rx="3" fill="#2c6b54"/>
    <rect x="44" y="46" width="132" height="8" rx="3" fill="#9fcab3"/>
    <rect x="44" y="60" width="110" height="8" rx="3" fill="#9fcab3"/>
    <rect x="44" y="80" width="56" height="18" rx="9" fill="#e8965a"/>
  </g>

  <!-- 安心感を伝える人物（支援する人・利用者） -->
  <g transform="translate(610 270)">
    <circle cx="24" cy="18" r="18" fill="#f4cfa6"/>
    <path d="M0 86c2-28 11-46 24-46s22 18 24 46z" fill="#4a8c6f"/>
  </g>
  <g transform="translate(660 290)">
    <circle cx="18" cy="14" r="14" fill="#f4cfa6"/>
    <path d="M0 70c2-22 8-36 18-36s16 14 18 36z" fill="#2c6b54"/>
  </g>
</svg>
