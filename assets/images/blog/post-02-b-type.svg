<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="就労継続支援B型事業所のホームページ制作イメージイラスト">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf6ec"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>

  <path d="M50 380c14-22 40-28 60-18-8 24-34 38-60 18z" fill="#4a8c6f" opacity="0.85"/>
  <circle cx="730" cy="80" r="10" fill="#e8965a" opacity="0.9"/>
  <circle cx="80" cy="70" r="7" fill="#e8965a" opacity="0.7"/>

  <!-- 作業台・道具のイメージ -->
  <g transform="translate(80 230)">
    <rect x="0" y="40" width="160" height="14" rx="6" fill="#2c6b54"/>
    <rect x="20" y="-10" width="30" height="50" rx="4" fill="#9fcab3"/>
    <rect x="60" y="-30" width="30" height="70" rx="4" fill="#4a8c6f"/>
    <rect x="100" y="-15" width="30" height="55" rx="4" fill="#9fcab3"/>
  </g>

  <!-- ノートパソコン + ホームページ画面 -->
  <g transform="translate(330 150)">
    <rect x="0" y="70" width="230" height="16" rx="7" fill="#1f4d3c"/>
    <rect x="20" y="0" width="190" height="120" rx="10" fill="#ffffff" stroke="#1f4d3c" stroke-width="5"/>
    <rect x="34" y="14" width="162" height="92" rx="4" fill="#fbf6ec"/>
    <rect x="46" y="26" width="100" height="12" rx="3" fill="#2c6b54"/>
    <rect x="46" y="46" width="138" height="8" rx="3" fill="#e0c9a0"/>
    <rect x="46" y="60" width="120" height="8" rx="3" fill="#e0c9a0"/>
    <rect x="46" y="80" width="60" height="18" rx="9" fill="#e8965a"/>
  </g>

  <!-- スマートフォン -->
  <g transform="translate(610 260)">
    <rect x="0" y="0" width="58" height="100" rx="12" fill="#1f4d3c"/>
    <rect x="6" y="10" width="46" height="74" rx="4" fill="#ffffff"/>
    <rect x="14" y="20" width="30" height="6" rx="2" fill="#2c6b54"/>
    <rect x="14" y="32" width="30" height="6" rx="2" fill="#e0c9a0"/>
    <rect x="14" y="44" width="22" height="6" rx="2" fill="#e0c9a0"/>
    <circle cx="29" cy="90" r="3" fill="#ffffff"/>
  </g>

  <!-- 支援する人・利用者 -->
  <g transform="translate(150 300)">
    <circle cx="26" cy="20" r="20" fill="#f4cfa6"/>
    <path d="M0 95c2-30 12-50 26-50s24 20 26 50z" fill="#4a8c6f"/>
  </g>
  <g transform="translate(220 320)">
    <circle cx="20" cy="16" r="15" fill="#f4cfa6"/>
    <path d="M0 75c2-24 9-39 20-39s18 15 20 39z" fill="#2c6b54"/>
  </g>
</svg>
