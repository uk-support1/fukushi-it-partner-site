<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="福祉現場でのAI活用イメージイラスト">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f4ee"/>
      <stop offset="100%" stop-color="#fbf6ec"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg3)"/>

  <path d="M730 360c-12-22-38-28-58-18 6 24 32 38 58 18z" fill="#4a8c6f" opacity="0.85"/>
  <circle cx="80" cy="80" r="9" fill="#e8965a" opacity="0.85"/>

  <!-- きらめき（AI） -->
  <g fill="#e8965a">
    <path d="M520 70l6 16 16 6-16 6-6 16-6-16-16-6 16-6z"/>
    <path d="M570 110l4 10 10 4-10 4-4 10-4-10-10-4 10-4z" opacity="0.8"/>
  </g>

  <!-- ノートパソコン + 画面 -->
  <g transform="translate(280 170)">
    <rect x="0" y="70" width="230" height="16" rx="7" fill="#1f4d3c"/>
    <rect x="20" y="0" width="190" height="120" rx="10" fill="#ffffff" stroke="#1f4d3c" stroke-width="5"/>
    <rect x="34" y="14" width="162" height="92" rx="4" fill="#e8f4ee"/>
    <circle cx="80" cy="60" r="22" fill="none" stroke="#4a8c6f" stroke-width="4"/>
    <path d="M80 38v44M58 60h44" stroke="#4a8c6f" stroke-width="4"/>
    <rect x="120" y="40" width="60" height="8" rx="3" fill="#9fcab3"/>
    <rect x="120" y="56" width="50" height="8" rx="3" fill="#9fcab3"/>
    <rect x="120" y="72" width="40" height="14" rx="7" fill="#e8965a"/>
  </g>

  <!-- 人物 -->
  <g transform="translate(120 280)">
    <circle cx="26" cy="20" r="20" fill="#f4cfa6"/>
    <path d="M0 95c2-30 12-50 26-50s24 20 26 50z" fill="#2c6b54"/>
  </g>

  <!-- スマートフォン -->
  <g transform="translate(600 250)">
    <rect x="0" y="0" width="58" height="100" rx="12" fill="#1f4d3c"/>
    <rect x="6" y="10" width="46" height="74" rx="4" fill="#ffffff"/>
    <circle cx="29" cy="40" r="12" fill="none" stroke="#4a8c6f" stroke-width="3"/>
    <rect x="14" y="60" width="30" height="6" rx="2" fill="#9fcab3"/>
    <circle cx="29" cy="90" r="3" fill="#ffffff"/>
