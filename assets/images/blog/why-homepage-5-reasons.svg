<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="福祉事業所とホームページ制作のイメージイラスト">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f4ee"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg1)"/>

  <!-- 若葉アクセント -->
  <path d="M40 60c14-22 40-28 60-18-8 24-34 38-60 18z" fill="#4a8c6f" opacity="0.85"/>
  <path d="M740 380c-12-22-38-28-58-18 6 24 32 38 58 18z" fill="#4a8c6f" opacity="0.85"/>
  <circle cx="700" cy="70" r="10" fill="#e8965a" opacity="0.9"/>
  <circle cx="60" cy="370" r="7" fill="#e8965a" opacity="0.8"/>

  <!-- 建物（福祉事業所） -->
  <g transform="translate(70 150)">
    <rect x="0" y="40" width="150" height="120" rx="10" fill="#ffffff" stroke="#2c6b54" stroke-width="4"/>
    <path d="M-10 40 L75 -10 L160 40 Z" fill="#1f4d3c"/>
    <rect x="25" y="70" width="30" height="30" rx="4" fill="#e8f4ee" stroke="#2c6b54" stroke-width="3"/>
    <rect x="95" y="70" width="30" height="30" rx="4" fill="#e8f4ee" stroke="#2c6b54" stroke-width="3"/>
    <rect x="60" y="115" width="30" height="45" rx="4" fill="#4a8c6f"/>
  </g>

  <!-- ノートパソコン + ホームページ画面 -->
  <g transform="translate(330 190)">
    <rect x="0" y="70" width="230" height="16" rx="7" fill="#1f4d3c"/>
    <rect x="20" y="0" width="190" height="120" rx="10" fill="#ffffff" stroke="#1f4d3c" stroke-width="5"/>
    <rect x="34" y="14" width="162" height="92" rx="4" fill="#e8f4ee"/>
    <rect x="46" y="26" width="100" height="12" rx="3" fill="#2c6b54"/>
    <rect x="46" y="46" width="138" height="8" rx="3" fill="#9fcab3"/>
    <rect x="46" y="60" width="120" height="8" rx="3" fill="#9fcab3"/>
    <rect x="46" y="80" width="50" height="18" rx="9" fill="#e8965a"/>
  </g>

  <!-- スマートフォン -->
  <g transform="translate(600 230)">
    <rect x="0" y="0" width="58" height="100" rx="12" fill="#1f4d3c"/>
    <rect x="6" y="10" width="46" height="74" rx="4" fill="#ffffff"/>
    <rect x="14" y="20" width="30" height="6" rx="2" fill="#2c6b54"/>
    <rect x="14" y="32" width="30" height="6" rx="2" fill="#9fcab3"/>
    <rect x="14" y="44" width="22" height="6" rx="2" fill="#9fcab3"/>
    <circle cx="29" cy="90" r="3" fill="#ffffff"/>
  </g>

  <!-- 相談する人・支援する人 -->
  <g transform="translate(130 300)">
    <circle cx="26" cy="20" r="20" fill="#f4cfa6"/>
    <path d="M0 95c2-30 12-50 26-50s24 20 26 50z" fill="#2c6b54"/>
  </g>
  <g transform="translate(220 310)">
    <circle cx="22" cy="18" r="17" fill="#f4cfa6"/>
    <path d="M0 82c2-26 10-43 22-43s20 17 22 43z" fill="#e8965a"/>
  </g>
</svg>
